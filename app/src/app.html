<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%">
	<head>
		<meta charset="utf-8" />

		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<script>
			(function () {
				var el = document.documentElement;
				var mode = localStorage.getItem('mode');
				if (mode && mode !== 'light') el.classList.add('dark');
				if (mode === 'midnight' || mode === 'catppuccin') el.classList.add(mode);

				var accent = localStorage.getItem('accent-color');
				if (accent && /^#[0-9a-fA-F]{6}$/.test(accent))
					el.style.setProperty('--color-accent', accent);

				if (localStorage.getItem('sidebar-pinned') === 'false')
					el.dataset.sidebarPinned = 'false';

				var font = localStorage.getItem('font');
				if (font === 'geist-mono')
					el.style.setProperty('--font-sans', "'GeistMono', monospace");
			})();
		</script>
		<style>
			html[data-sidebar-pinned='false'] aside { width: 64px !important; }
			html[data-sidebar-pinned='false'] aside .whitespace-nowrap,
			html[data-sidebar-pinned='false'] aside .truncate { display: none !important; }
			html[data-sidebar-pinned='false'] div[style*="margin-left: 240px"] { margin-left: 64px !important; }
		</style>

		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
