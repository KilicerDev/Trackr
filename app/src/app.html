<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%">
	<head>
		<meta charset="utf-8" />

		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<script>
			(function () {
				const mode = localStorage.getItem('mode');
				if (mode === 'dark') document.documentElement.classList.add('dark');
				else if (mode === 'light') document.documentElement.classList.remove('dark');

				if (localStorage.getItem('sidebar-pinned') === 'false')
					document.documentElement.dataset.sidebarPinned = 'false';

				var font = localStorage.getItem('font');
				if (font === 'geist-mono')
					document.documentElement.style.setProperty('--font-sans', "'GeistMono', monospace");
			})();
		</script>
		<style>
			html[data-sidebar-pinned='false'] aside { width: 64px !important; }
			html[data-sidebar-pinned='false'] aside .whitespace-nowrap,
			html[data-sidebar-pinned='false'] aside .truncate { display: none !important; }
			html[data-sidebar-pinned='false'] div[style*="margin-left: 240px"] { margin-left: 64px !important; }
		</style>

		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
